version: "3.7"

services:
    app:
        build:
            context: .docker/php/
        container_name: app-estacionamento
        volumes:
            - ./:/var/www/html
        ports:
            - "9000:9000"
        depends_on:
            - nginx
            - db
    nginx:
        container_name: nginx-estacionamento
        image: nginx:latest
        ports:
            - "80:80"
        volumes:
            - ./:/var/www/html
            - .docker/nginx/:/etc/nginx/conf.d

    db:
        image: mysql:latest
        command: --innodb-use-native-aio=0
        container_name: db-estacionamento
        restart: always
        tty: true
        environment:
            - MYSQL_DATABASE=php
            - MYSQL_ROOT_PASSWORD=1234
            - MYSQL_USER=leandro
